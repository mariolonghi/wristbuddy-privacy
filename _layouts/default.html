{%- assign current_lang = page.lang | default: 'en' -%}
{%- assign t = site.data.i18n[current_lang] | default: site.data.i18n.en -%}
<!doctype html>
<html lang="{{ current_lang }}">
<head>
  <meta charset="utf-8" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1B1B1F" />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon/icon-32.png' | relative_url }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon/icon-16.png' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/favicon/icon-180.png' | relative_url }}" />
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}" />

  <!-- OG / Twitter card -->
  <meta property="og:title" content="WristBuddy · {{ page.title | default: 'Privacy' }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:image" content="{{ '/og-image.png' | absolute_url }}" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:locale" content="{{ current_lang | replace: '-', '_' }}" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- hreflang for the other translations -->
  {%- for l in site.data.locales.locales %}
  <link rel="alternate" hreflang="{{ l.code }}" href="{{ l.path | relative_url }}" />
  {%- endfor %}
  <link rel="alternate" hreflang="x-default" href="{{ '/' | relative_url }}" />

  <!-- Brand fonts (preconnect for faster paint) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />

  <!-- Set initial dark/light class BEFORE body paints to avoid flash -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('wb-theme');
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored ? stored === 'dark' : prefersDark;
        if (dark) document.documentElement.classList.add('wb-dark-pending');
      } catch (e) {}
    })();
  </script>
  <style>
    /* Mirror body.wb-dark on <html> so the no-flash script can paint dark immediately */
    html.wb-dark-pending { background: #1B1B1F; }
    html.wb-dark-pending body { background: #1B1B1F; color: rgba(242, 242, 247, 0.92); }
  </style>
</head>

<body>
  <div class="wb-page">

    <header class="wb-header">
      <a class="brand" href="{{ '/' | relative_url }}">
        <img class="logo" src="{{ '/assets/icon-rounded.svg' | relative_url }}" alt="{{ t.brand_aria }}" />
        <span class="name"><span>Wrist</span><span class="accent">Buddy</span></span>
      </a>
      <div class="actions">
        <select id="wb-lang-switcher" class="wb-lang-switcher" aria-label="{{ t.language_switcher_aria }}">
          {%- for l in site.data.locales.locales %}
          <option value="{{ l.path | relative_url }}" {% if l.code == current_lang %}selected{% endif %}>{{ l.name }}</option>
          {%- endfor %}
        </select>
        <button id="wb-theme-toggle" class="wb-theme-toggle" type="button" aria-label="{{ t.theme_toggle_aria }}" aria-pressed="false">
          <span class="icon" aria-hidden="true">◐</span>
          <span class="label">{{ t.theme_toggle_label }}</span>
        </button>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="wb-footer">
      <div class="left">
        <img src="{{ '/assets/icon-rounded.svg' | relative_url }}" alt="" />
        <span>{{ t.footer_tagline }}</span>
      </div>
      <div><a href="mailto:wristbuddyapp+policy@gmail.com">{{ t.contact }}</a></div>
    </footer>

  </div>

  <!-- Dark-mode toggle: persists choice to localStorage, defaults to OS preference -->
  <script>
    (function () {
      var btn = document.getElementById('wb-theme-toggle');
      if (btn) {
        function apply(dark) {
          document.body.classList.toggle('wb-dark', dark);
          document.documentElement.classList.remove('wb-dark-pending');
          btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
        }
        var stored = null;
        try { stored = localStorage.getItem('wb-theme'); } catch (e) {}
        var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        apply(stored ? stored === 'dark' : prefersDark);

        btn.addEventListener('click', function () {
          var nowDark = !document.body.classList.contains('wb-dark');
          apply(nowDark);
          try { localStorage.setItem('wb-theme', nowDark ? 'dark' : 'light'); } catch (e) {}
        });
      }

      // Language switcher: navigate on change.
      var sel = document.getElementById('wb-lang-switcher');
      if (sel) {
        sel.addEventListener('change', function () {
          if (this.value) window.location.href = this.value;
        });
      }
    })();
  </script>
</body>
</html>
